name: Development Build

on:
  push:
    tags:
      - 'develop-v*'

concurrency:
  group: develop-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.config.os }})
    strategy:
      fail-fast: false
      matrix:
        config:
          - os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            args: ''
          - os: macos-latest
            rust-target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
          - os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            args: ''
    runs-on: ${{ matrix.config.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build Tauri app (unsigned)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Wit Terminal ${{ github.ref_name }} (Development)'
          releaseBody: |
            **Development build** — unsigned, for testing only.

            See the [CHANGELOG](https://github.com/nickcdryan/wit-term/blob/main/CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.config.args }}
